name: Deploy to Production (GKE)

on:
  workflow_dispatch:
    inputs:
      run_seed:
        description: "Run production seed (creates Platform Admin user). Idempotent — safe to re-run."
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  GCP_PROJECT: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: asia-south1
  AR_REPO: compportiq-prod-docker
  GKE_CLUSTER: compportiq-prod-cluster
  K8S_NAMESPACE: compportiq

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Authenticate to GCP via Workload Identity Federation ──
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install GKE auth plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      # ─── Configure Docker for Artifact Registry ───────────────
      - name: Configure Docker
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Set image tag
        id: tag
        run: echo "TAG=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # ─── Build & Push Images ─────────────────────────────────
      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/api:${{ steps.tag.outputs.TAG }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/api:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          tags: |
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/web:${{ steps.tag.outputs.TAG }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/web:latest

      # ─── Get GKE credentials ──────────────────────────────────
      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} --project ${{ env.GCP_PROJECT }}

      # ─── Run database migrations ──────────────────────────────
      - name: Run Prisma migrations
        run: |
          API_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/api:${{ steps.tag.outputs.TAG }}"
          DB_URL=$(kubectl get secret api-secrets -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.data.DATABASE_URL}' | base64 -d)

          kubectl run migrate-${{ steps.tag.outputs.TAG }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --image="$API_IMAGE" \
            --restart=Never \
            --env="DATABASE_URL=$DB_URL" \
            --command -- sh -c "cd /app/packages/database && node_modules/.bin/prisma migrate deploy"

          kubectl wait --for=condition=Ready pod/migrate-${{ steps.tag.outputs.TAG }} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=60s 2>/dev/null || true

          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded \
            pod/migrate-${{ steps.tag.outputs.TAG }} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=300s

          echo "✅ Database migrations applied"
          kubectl logs migrate-${{ steps.tag.outputs.TAG }} -n ${{ env.K8S_NAMESPACE }} | tail -5
          kubectl delete pod migrate-${{ steps.tag.outputs.TAG }} -n ${{ env.K8S_NAMESPACE }} --ignore-not-found

      # ─── Deploy to GKE ───────────────────────────────────────
      - name: Deploy API
        run: |
          API_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/api:${{ steps.tag.outputs.TAG }}"
          kubectl set image deployment/api api="$API_IMAGE" -n ${{ env.K8S_NAMESPACE }}
          kubectl set image deployment/sync-worker sync-worker="$API_IMAGE" -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/api -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          kubectl rollout status deployment/sync-worker -n ${{ env.K8S_NAMESPACE }} --timeout=300s
          echo "✅ API + Sync Workers deployed"

      - name: Deploy Web
        run: |
          WEB_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/web:${{ steps.tag.outputs.TAG }}"
          kubectl set image deployment/web web="$WEB_IMAGE" -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout status deployment/web -n ${{ env.K8S_NAMESPACE }} --timeout=120s
          echo "✅ Web deployed"

      # ─── Health Check ────────────────────────────────────────
      - name: Verify API health
        id: api_health
        continue-on-error: true
        run: |
          for i in 1 2 3 4 5; do
            HEALTH=$(kubectl exec -n ${{ env.K8S_NAMESPACE }} deployment/api -- \
              curl -sf http://localhost:4000/health 2>/dev/null || echo '{"status":"error"}')
            STATUS=$(echo "$HEALTH" | python3 -c "import json,sys; print(json.load(sys.stdin).get('status','error'))" 2>/dev/null || echo "error")
            if [ "$STATUS" = "ok" ]; then
              echo "✅ API health check passed (attempt $i)"
              echo "$HEALTH"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done
          echo "❌ API health check failed after 5 attempts"
          exit 1

      # ─── Rollback on failure ─────────────────────────────────
      - name: Rollback on failure
        if: steps.api_health.outcome == 'failure'
        run: |
          echo "⚠️ Rolling back deployments..."
          kubectl rollout undo deployment/api -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout undo deployment/sync-worker -n ${{ env.K8S_NAMESPACE }}
          kubectl rollout undo deployment/web -n ${{ env.K8S_NAMESPACE }}
          echo "❌ Deployment failed — rolled back"
          exit 1

      # ─── Seed (optional) ─────────────────────────────────────
      - name: Seed Platform Admin user
        if: ${{ github.event.inputs.run_seed == 'true' }}
        run: |
          API_IMAGE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.AR_REPO }}/api:${{ steps.tag.outputs.TAG }}"
          DB_URL=$(kubectl get secret api-secrets -n ${{ env.K8S_NAMESPACE }} \
            -o jsonpath='{.data.DATABASE_URL}' | base64 -d)

          kubectl run seed-${{ steps.tag.outputs.TAG }} \
            -n ${{ env.K8S_NAMESPACE }} \
            --image="$API_IMAGE" \
            --restart=Never \
            --env="DATABASE_URL=$DB_URL" \
            --command -- sh -c "cd /app/packages/database && node_modules/.bin/tsx prisma/seed-prod.ts"

          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded \
            pod/seed-${{ steps.tag.outputs.TAG }} \
            -n ${{ env.K8S_NAMESPACE }} --timeout=120s

          echo "✅ Database seeded"
          kubectl delete pod seed-${{ steps.tag.outputs.TAG }} -n ${{ env.K8S_NAMESPACE }} --ignore-not-found
