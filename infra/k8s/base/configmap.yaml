apiVersion: v1
kind: ConfigMap
metadata:
  name: compportiq-config
  namespace: compportiq
data:
  NODE_ENV: "production"
  API_PORT: "4000"
  CORS_ORIGINS: "https://compportiq.ai"
  JWT_EXPIRATION: "1d"
  LOG_LEVEL: "info"
  COMPPORT_MODE: "standalone"

  # Next.js
  NEXT_PUBLIC_API_URL: "https://compportiq.ai/api"
  NEXTAUTH_URL: "https://compportiq.ai"
  NEXT_TELEMETRY_DISABLED: "1"

  # Azure OpenAI
  AI_PROVIDER: "azure"
  AZURE_OPENAI_API_VERSION: "2024-08-01-preview"

  # Database pool (non-secret)
  DB_POOL_MIN: "2"
  DB_POOL_MAX: "20"
  DB_SSL: "true"

  # Shutdown
  SHUTDOWN_TIMEOUT: "30000"

