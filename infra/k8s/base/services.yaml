apiVersion: v1
kind: Service
metadata:
  name: compportiq-api
  namespace: compportiq
  labels:
    app: compportiq-api
spec:
  type: ClusterIP
  selector:
    app: compportiq-api
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: compportiq-web
  namespace: compportiq
  labels:
    app: compportiq-web
spec:
  type: ClusterIP
  selector:
    app: compportiq-web
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP

