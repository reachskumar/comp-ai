apiVersion: apps/v1
kind: Deployment
metadata:
  name: compportiq-web
  namespace: compportiq
  labels:
    app: compportiq-web
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: compportiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compportiq-web
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: compportiq-web
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: web
          image: PLACEHOLDER_WEB_IMAGE
          ports:
            - containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: compportiq-config
            - secretRef:
                name: compportiq-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

