apiVersion: apps/v1
kind: Deployment
metadata:
  name: compportiq-api
  namespace: compportiq
  labels:
    app: compportiq-api
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: compportiq
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compportiq-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: compportiq-api
    spec:
      serviceAccountName: compportiq-api
      terminationGracePeriodSeconds: 30
      # Init container: run database migrations before API starts
      initContainers:
        - name: migrate
          image: PLACEHOLDER_API_IMAGE
          command: ["npx", "prisma", "migrate", "deploy"]
          workingDir: /app/packages/database
          envFrom:
            - configMapRef:
                name: compportiq-config
            - secretRef:
                name: compportiq-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      containers:
        - name: api
          image: PLACEHOLDER_API_IMAGE
          ports:
            - containerPort: 4000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: compportiq-config
            - secretRef:
                name: compportiq-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi

