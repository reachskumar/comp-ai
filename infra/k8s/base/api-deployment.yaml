apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: compportiq
  labels:
    app: api
    app.kubernetes.io/part-of: compportiq
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      serviceAccountName: compportiq-api
      containers:
        - name: api
          image: asia-south1-docker.pkg.dev/compportiq/compportiq-prod-docker/api:latest
          ports:
            - containerPort: 4000
              name: http
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_PORT
              value: "4000"
            - name: LOG_LEVEL
              value: "info"
            - name: COMPPORT_MODE
              value: "standalone"
            - name: AI_PROVIDER
              value: "anthropic"
            - name: ANTHROPIC_MODEL
              value: "claude-opus-4-6"
            - name: SHUTDOWN_TIMEOUT
              value: "30000"
            - name: MYSQL_CA_CERT
              value: "/keys/server-ca.pem"
            - name: MYSQL_CLIENT_CERT
              value: "/keys/app-cert.pem"
            - name: MYSQL_CLIENT_KEY
              value: "/keys/app-key.pem"
          envFrom:
            - secretRef:
                name: api-secrets
          volumeMounts:
            - name: mysql-certs
              mountPath: /keys
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24  # 120s startup window

      volumes:
        - name: mysql-certs
          secret:
            secretName: mysql-certs
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [api]
                topologyKey: "topology.kubernetes.io/zone"
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: compportiq
spec:
  selector:
    app: api
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: compportiq
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
