apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compportiq-ingress
  namespace: compportiq
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "compportiq-gke-ip"
    networking.gke.io/managed-certificates: "compportiq-cert"
spec:
  defaultBackend:
    service:
      name: web
      port:
        number: 80
  rules:
    - host: "compportiq.ai"
      http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /health
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: compportiq-cert
  namespace: compportiq
spec:
  domains:
    - "compportiq.ai"
    - "bfl.compportiq.ai"
