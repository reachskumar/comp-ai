apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compportiq-ingress
  namespace: compportiq
  annotations:
    # AWS ALB Ingress Controller annotations
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: PLACEHOLDER_ACM_CERT_ARN
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/success-codes: "200"
    alb.ingress.kubernetes.io/group.name: compportiq
spec:
  rules:
    - host: compportiq.ai
      http:
        paths:
          # API routes — /api/* → API service
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: compportiq-api
                port:
                  number: 4000
          # Auth routes — /auth/* → API service
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: compportiq-api
                port:
                  number: 4000
          # Health check → API service
          - path: /health
            pathType: Exact
            backend:
              service:
                name: compportiq-api
                port:
                  number: 4000
          # Everything else → Web (Next.js)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: compportiq-web
                port:
                  number: 3000

