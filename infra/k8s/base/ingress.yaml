apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: compportiq-ingress
  namespace: compportiq
  annotations:
    kubernetes.io/ingress.class: "gce"
    kubernetes.io/ingress.global-static-ip-name: "compportiq-gke-ip"
    # Wildcard SSL is handled by Certificate Manager cert map
    # attached to the HTTPS proxy (compportiq-prod-cert-map).
    # No ManagedCertificate needed — any *.compportiq.ai works automatically.
spec:
  defaultBackend:
    service:
      name: web
      port:
        number: 80
  rules:
    - host: "compportiq.ai"
      http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /health
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  number: 80
    - host: "*.compportiq.ai"
      http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /health
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 80
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: web
                port:
                  number: 80
