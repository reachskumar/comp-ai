apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-worker
  namespace: compportiq
  labels:
    app: sync-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sync-worker
  template:
    metadata:
      labels:
        app: sync-worker
    spec:
      serviceAccountName: compportiq-api
      containers:
        - name: sync-worker
          image: asia-south1-docker.pkg.dev/compportiq/compportiq-prod-docker/api:latest
          command: ["node"]
          args: ["--max-old-space-size=4096", "--experimental-require-module", "apps/api/dist/main.js"]
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_PORT
              value: "4001"
            - name: LOG_LEVEL
              value: "info"
            - name: COMPPORT_MODE
              value: "standalone"
            - name: AI_PROVIDER
              value: "anthropic"
            - name: ANTHROPIC_MODEL
              value: "claude-opus-4-6"
            - name: SHUTDOWN_TIMEOUT
              value: "60000"
            - name: MYSQL_CA_CERT
              value: "/keys/server-ca.pem"
            - name: MYSQL_CLIENT_CERT
              value: "/keys/app-cert.pem"
            - name: MYSQL_CLIENT_KEY
              value: "/keys/app-key.pem"
          envFrom:
            - secretRef:
                name: api-secrets
          volumeMounts:
            - name: mysql-certs
              mountPath: /keys
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 60
      volumes:
        - name: mysql-certs
          secret:
            secretName: mysql-certs
