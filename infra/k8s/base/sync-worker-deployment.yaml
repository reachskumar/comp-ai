apiVersion: apps/v1
kind: Deployment
metadata:
  name: sync-worker
  namespace: compportiq
  labels:
    app: sync-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sync-worker
  template:
    metadata:
      labels:
        app: sync-worker
    spec:
      serviceAccountName: compportiq-api
      # Schedule on worker node pool (spot instances)
      tolerations:
        - key: "workload"
          value: "sync"
          effect: "NoSchedule"
      nodeSelector:
        pool: workers
      containers:
        - name: sync-worker
          image: asia-south1-docker.pkg.dev/compportiq/compportiq-prod-docker/api:latest
          # Same image as API but only runs the BullMQ processor
          command: ["node"]
          args: ["--max-old-space-size=4096", "--experimental-require-module", "dist/main.js"]
          resources:
            requests:
              cpu: "1000m"
              memory: "2Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: API_PORT
              value: "4001"  # Different port, not exposed
            - name: LOG_LEVEL
              value: "info"
            - name: COMPPORT_MODE
              value: "standalone"
            - name: AI_PROVIDER
              value: "azure"
            - name: SHUTDOWN_TIMEOUT
              value: "60000"  # Longer shutdown for workers
          envFrom:
            - secretRef:
                name: api-secrets
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 60
